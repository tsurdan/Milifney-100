name: Fetch Tweets

on:
  schedule:
    - cron: '0 */1 * * *'   # Every 1 hour
  workflow_dispatch:          # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch new tweets
        run: python scripts/fetch_tweets.py

      - name: Fetch popular posts from GoatCounter
        env:
          GOATCOUNTER_TOKEN: ${{ secrets.GOATCOUNTER_TOKEN }}
        run: python scripts/fetch_popular.py

      - name: Commit & push new posts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Add new posts from Twitter"
          git push

      - name: Post new articles to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scripts/post_telegram.py
          git add scripts/.last_telegram_post
          git diff --staged --quiet || git commit -m "Update Telegram state" && git push

---
layout: default
title: ניהול ניוזלטר
permalink: /newsletter-admin/
---
<style>
  .nl-admin { max-width: 700px; margin: 2rem auto; padding: 1.5rem; }
  .nl-admin h1 { font-size: 1.5rem; margin-bottom: 1rem; }
  .nl-gate, .nl-panel { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .nl-field { margin-bottom: 1rem; }
  .nl-field label { display: block; font-weight: 600; margin-bottom: 0.3rem; font-size: 0.9rem; }
  .nl-field input, .nl-field textarea { width: 100%; padding: 0.6rem; border: 1px solid var(--border); border-radius: 4px; font-size: 0.95rem; font-family: inherit; direction: rtl; }
  .nl-field textarea { min-height: 100px; resize: vertical; }
  .nl-btn { background: var(--accent); color: #fff; border: none; padding: 0.6rem 1.4rem; border-radius: 4px; font-size: 0.95rem; font-weight: 600; cursor: pointer; font-family: inherit; }
  .nl-btn:hover { opacity: 0.9; }
  .nl-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .nl-btn-secondary { background: var(--meta); }
  .nl-msg { padding: 0.6rem 1rem; border-radius: 4px; margin-top: 0.8rem; font-size: 0.9rem; }
  .nl-msg.success { background: #d4edda; color: #155724; }
  .nl-msg.error { background: #f8d7da; color: #721c24; }
  .nl-articles { margin: 1rem 0; }
  .nl-article-item { display: flex; align-items: flex-start; gap: 0.8rem; padding: 0.8rem; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 0.6rem; background: var(--bg); cursor: pointer; transition: border-color 0.2s; }
  .nl-article-item:hover { border-color: var(--accent); }
  .nl-article-item.selected { border-color: var(--accent); background: rgba(139,26,26,0.05); }
  .nl-article-item input[type="checkbox"] { margin-top: 0.2rem; accent-color: var(--accent); }
  .nl-article-info h4 { margin: 0 0 0.2rem 0; font-size: 0.95rem; }
  .nl-article-info p { margin: 0; font-size: 0.8rem; color: var(--meta); }
  .nl-article-info time { font-size: 0.75rem; color: var(--meta); }
  .nl-preview { border: 2px solid var(--border); border-radius: 8px; padding: 1rem; background: #fff; margin-top: 1rem; }
  .nl-preview h3 { font-size: 1.1rem; margin-bottom: 0.5rem; }
  .nl-actions { display: flex; gap: 0.8rem; flex-wrap: wrap; margin-top: 1rem; }
  .nl-count { font-size: 0.85rem; color: var(--meta); margin-top: 0.5rem; }
  #nl-app { display: none; }
</style>

<div class="nl-admin">
  <h1>📬 ניהול ניוזלטר</h1>

  <!-- Password Gate -->
  <div class="nl-gate" id="nl-gate">
    <div class="nl-field">
      <label for="nl-password">סיסמת מנהל</label>
      <input type="password" id="nl-password" placeholder="הזינו סיסמה...">
    </div>
    <button class="nl-btn" id="nl-login">כניסה</button>
    <div id="nl-gate-msg"></div>
  </div>

  <!-- Admin Panel (hidden until login) -->
  <div id="nl-app">
    <!-- Step 1: Select articles -->
    <div class="nl-panel">
      <h2>1. בחירת כתבות</h2>
      <p style="font-size: 0.85rem; color: var(--meta);">בחרו עד 3 כתבות מהשבוע האחרון:</p>
      <div class="nl-articles" id="nl-articles-list">
        <!-- Populated by JS -->
      </div>
      <p class="nl-count">נבחרו: <span id="nl-selected-count">0</span>/3</p>
    </div>

    <!-- Step 2: Compose -->
    <div class="nl-panel">
      <h2>2. נוסח הפתיחה</h2>
      <div class="nl-field">
        <label for="nl-subject">נושא המייל (Subject)</label>
        <input type="text" id="nl-subject" placeholder="סיכום שבועי — חדשות מלפני מאה">
      </div>
      <div class="nl-field">
        <label for="nl-intro">טקסט פתיחה</label>
        <textarea id="nl-intro" placeholder="שלום לכולם, הנה הסיכום השבועי שלנו..."></textarea>
      </div>
    </div>

    <!-- Step 3: Preview & Send -->
    <div class="nl-panel">
      <h2>3. תצוגה מקדימה ושליחה</h2>
      <div class="nl-actions">
        <button class="nl-btn nl-btn-secondary" id="nl-preview-btn">תצוגה מקדימה</button>
        <button class="nl-btn" id="nl-send-btn" disabled>שליחה לכל המנויים</button>
      </div>
      <div id="nl-preview-area"></div>
      <div id="nl-send-msg"></div>
    </div>
  </div>
</div>

<script>
(function() {
  // ── Config ──
  var WORKER_URL = 'https://milifney100-newsletter.YOUR_SUBDOMAIN.workers.dev'; // CHANGE THIS after deploy

  var password = '';
  var selectedArticles = [];

  // ── Articles data from Jekyll ──
  var allArticles = [
    {% assign recent = site.posts | slice: 0, 30 %}
    {% for p in recent %}
    {
      title: {{ p.title | jsonify }},
      date: "{{ p.date | date: '%d.%m.%Y' }}",
      url: "{{ p.url | absolute_url }}",
      image: "{{ p.image | absolute_url }}",
      excerpt: {{ p.content | strip_html | strip_newlines | truncate: 150 | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  // ── DOM ──
  var gate = document.getElementById('nl-gate');
  var app = document.getElementById('nl-app');
  var passInput = document.getElementById('nl-password');
  var loginBtn = document.getElementById('nl-login');
  var gateMsg = document.getElementById('nl-gate-msg');
  var articlesList = document.getElementById('nl-articles-list');
  var selectedCount = document.getElementById('nl-selected-count');
  var subjectInput = document.getElementById('nl-subject');
  var introInput = document.getElementById('nl-intro');
  var previewBtn = document.getElementById('nl-preview-btn');
  var sendBtn = document.getElementById('nl-send-btn');
  var previewArea = document.getElementById('nl-preview-area');
  var sendMsg = document.getElementById('nl-send-msg');

  // ── Login ──
  loginBtn.addEventListener('click', function() {
    password = passInput.value.trim();
    if (!password) {
      showMsg(gateMsg, 'הזינו סיסמה', 'error');
      return;
    }
    gate.style.display = 'none';
    app.style.display = 'block';
    renderArticles();
  });

  passInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') loginBtn.click();
  });

  // ── Render articles list ──
  function renderArticles() {
    // Show last 7 days only
    var now = new Date();
    var weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);
    var html = '';
    allArticles.forEach(function(a, i) {
      html += '<label class="nl-article-item" data-idx="' + i + '">' +
        '<input type="checkbox" data-idx="' + i + '">' +
        '<div class="nl-article-info">' +
          '<h4>' + escapeHtml(a.title) + '</h4>' +
          '<time>' + a.date + '</time>' +
          '<p>' + escapeHtml(a.excerpt.substring(0, 80)) + '...</p>' +
        '</div>' +
      '</label>';
    });
    articlesList.innerHTML = html;

    // Checkbox events
    articlesList.querySelectorAll('input[type="checkbox"]').forEach(function(cb) {
      cb.addEventListener('change', function() {
        var idx = parseInt(this.dataset.idx);
        var item = this.closest('.nl-article-item');
        if (this.checked) {
          if (selectedArticles.length >= 3) {
            this.checked = false;
            return;
          }
          selectedArticles.push(allArticles[idx]);
          item.classList.add('selected');
        } else {
          selectedArticles = selectedArticles.filter(function(a) { return a !== allArticles[idx]; });
          item.classList.remove('selected');
        }
        selectedCount.textContent = selectedArticles.length;
        sendBtn.disabled = selectedArticles.length === 0 || !subjectInput.value.trim();
      });
    });
  }

  // ── Enable send when ready ──
  subjectInput.addEventListener('input', function() {
    sendBtn.disabled = selectedArticles.length === 0 || !this.value.trim();
  });

  // ── Preview ──
  previewBtn.addEventListener('click', function() {
    if (selectedArticles.length === 0) {
      previewArea.innerHTML = '<p class="nl-msg error">בחרו לפחות כתבה אחת</p>';
      return;
    }
    var html = '<div class="nl-preview"><h3>' + escapeHtml(subjectInput.value || 'ללא נושא') + '</h3>';
    html += '<p style="white-space:pre-line;">' + escapeHtml(introInput.value || '') + '</p><hr style="margin:1rem 0;">';
    selectedArticles.forEach(function(a) {
      html += '<div style="margin-bottom:1rem;padding:0.8rem;border:1px solid var(--border);border-radius:6px;">';
      html += '<strong>' + escapeHtml(a.title) + '</strong><br>';
      html += '<small>' + a.date + '</small>';
      html += '<p style="font-size:0.85rem;">' + escapeHtml(a.excerpt.substring(0, 120)) + '...</p>';
      html += '</div>';
    });
    html += '</div>';
    previewArea.innerHTML = html;
  });

  // ── Send ──
  sendBtn.addEventListener('click', async function() {
    if (!confirm('לשלוח את הניוזלטר לכל המנויים?')) return;

    sendBtn.disabled = true;
    sendBtn.textContent = 'שולח...';
    sendMsg.innerHTML = '';

    var payload = {
      password: password,
      subject: subjectInput.value.trim(),
      intro: introInput.value.trim(),
      articles: selectedArticles.map(function(a) {
        return { title: a.title, date: a.date, url: a.url, image: a.image, excerpt: a.excerpt };
      })
    };

    try {
      var resp = await fetch(WORKER_URL + '/send-newsletter', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      var data = await resp.json();
      if (data.success) {
        showMsg(sendMsg, '✓ ' + data.message, 'success');
      } else {
        showMsg(sendMsg, data.error || 'שגיאה בשליחה', 'error');
      }
    } catch (err) {
      showMsg(sendMsg, 'שגיאת רשת: ' + err.message, 'error');
    }

    sendBtn.disabled = false;
    sendBtn.textContent = 'שליחה לכל המנויים';
  });

  // ── Helpers ──
  function showMsg(el, text, type) {
    el.innerHTML = '<div class="nl-msg ' + type + '">' + text + '</div>';
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
  }
})();
</script>

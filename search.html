---
layout: default
title: חיפוש
---
<div class="search-page">
  <h2 class="search-page-title">תוצאות חיפוש</h2>
  <p class="search-query-display"></p>
  <div class="search-results"></div>
  <p class="search-no-results" style="display:none;">לא נמצאו תוצאות.</p>
</div>

<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const query = (params.get('q') || '').trim();
  const dateFilter = params.get('date') || '';

  const queryDisplay = document.querySelector('.search-query-display');
  const resultsContainer = document.querySelector('.search-results');
  const noResults = document.querySelector('.search-no-results');
  const searchInput = document.querySelector('.search-input');
  const datePicker = document.getElementById('filter-date');

  if (searchInput && query) searchInput.value = query;
  if (datePicker && dateFilter) datePicker.value = dateFilter;

  if (query) {
    queryDisplay.textContent = 'חיפוש: "' + query + '"';
  } else if (dateFilter) {
    var parts = dateFilter.split('-');
    var display = parts[2] + '.' + parts[1] + '.' + parts[0];
    queryDisplay.textContent = 'ידיעות מתאריך ' + display;
  }

  function highlightText(text, terms) {
    if (!terms.length) return escapeHtml(text);
    var escaped = escapeHtml(text);
    terms.forEach(function(term) {
      var re = new RegExp('(' + escapeRegex(term) + ')', 'gi');
      escaped = escaped.replace(re, '<mark>$1</mark>');
    });
    return escaped;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  fetch('{{ "/search.json" | relative_url }}')
    .then(function(r) { return r.json(); })
    .then(function(posts) {
      var results = posts;
      var terms = [];

      if (query) {
        terms = query.toLowerCase().split(/\s+/);
        results = results.filter(function(post) {
          var text = (post.title + ' ' + post.content).toLowerCase();
          return terms.every(function(t) { return text.includes(t); });
        });
      }

      if (dateFilter) {
        results = results.filter(function(post) {
          return post.date_iso === dateFilter || post.date_iso.startsWith(dateFilter);
        });
      }

      if (results.length === 0) {
        noResults.style.display = 'block';
        return;
      }

      results.forEach(function(post) {
        var article = document.createElement('article');
        article.className = 'search-result-item';
        var titleHtml = highlightText(post.title, terms);
        var snippet = post.content.substring(0, 180);
        var snippetHtml = highlightText(snippet, terms);

        article.innerHTML =
          '<a href="' + post.url + '" class="search-result-link">' +
            (post.image ? '<img src="' + post.image + '" alt="" class="search-result-img" loading="lazy">' : '') +
            '<div class="search-result-body">' +
              '<time>' + post.date + '</time>' +
              '<h3>' + titleHtml + '</h3>' +
              '<p>' + snippetHtml + '...</p>' +
            '</div>' +
          '</a>';
        resultsContainer.appendChild(article);
      });
    });
})();
</script>

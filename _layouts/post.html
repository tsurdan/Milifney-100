---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%d.%m.%Y" }}
      </time>
      {% if page.tweet_id %}
      · <a href="https://x.com/Milifney100/status/{{ page.tweet_id }}" target="_blank" rel="noopener">צפה בציוץ המקורי</a>
      {% endif %}
    </div>
  </header>

  {% if page.image %}
  <figure class="post-image">
    <img src="{{ page.image | relative_url }}" alt="{{ page.image_alt | default: page.title }}">
    {% if page.image_alt %}
    <figcaption>{{ page.image_alt }}</figcaption>
    {% endif %}
  </figure>
  {% endif %}

  <div class="post-content">
    {{ content }}
  </div>

  <nav class="post-nav">
    <a href="{{ '/' | relative_url }}">← חזרה לעמוד הראשי</a>
  </nav>
</article>

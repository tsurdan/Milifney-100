<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:type" content="{% if page.title %}article{% else %}website{% endif %}">
  {% if page.image %}<meta property="og:image" content="{{ page.image | absolute_url }}">{% endif %}
  <link rel="icon" type="image/png" href="{{ '/assets/images/branding/favicon.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/images/branding/avatar.jpg' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <nav class="navbar" style="background-image: url('{{ '/assets/images/branding/banner.jpg' | relative_url }}')">
    <div class="navbar-overlay"></div>
    <div class="navbar-inner">
      <a href="{{ '/' | relative_url }}" class="navbar-brand">
        <img src="{{ '/assets/images/branding/avatar.jpg' | relative_url }}" alt="{{ site.title }}" class="navbar-logo">
        <div class="navbar-brand-text">
          <span class="navbar-title">{{ site.title }}</span>
          <span class="navbar-tagline">{{ site.tagline }}</span>
        </div>
      </a>
      <div class="navbar-actions">
        <a class="navbar-btn" href="{{ '/popular' | relative_url }}" aria-label="הנקראים ביותר" title="הנקראים ביותר">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
        <button class="navbar-btn" id="btn-search" aria-label="חיפוש">
          <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <button class="navbar-btn" id="btn-date" aria-label="בחר תאריך">
          <svg viewBox="0 0 24 24" width="18" height="18"><rect x="3" y="4" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="2"/><line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <input type="date" id="filter-date" class="hidden-date-input">
        </button>
      </div>
    </div>
    <!-- Search overlay -->
    <div class="navbar-panel" id="panel-search" hidden>
      <form class="panel-search-form" action="{{ '/search' | relative_url }}" method="get">
        <input type="search" name="q" placeholder="חיפוש בידיעות..." class="panel-search-input" autocomplete="off">
        <button type="submit" class="panel-search-submit">חפש</button>
        <button type="button" class="panel-close" data-panel="panel-search">✕</button>
      </form>
    </div>
    <!-- Date picker overlay -->
    <div class="navbar-panel" id="panel-date" hidden></div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-credit">
        התוכן באתר מבוסס על חשבון הטוויטר
        <a href="https://x.com/Milifney100" target="_blank" rel="noopener">Milifney100</a>
        ועל
        <a href="https://www.nli.org.il/he/newspapers" target="_blank" rel="noopener">ארכיון העיתונות</a>
      </p>
    </div>
  </footer>
  <script data-goatcounter="https://milifney100.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
  <script>
    // Navbar panels (search + date picker)
    (function() {
      var btnSearch = document.getElementById('btn-search');
      var btnDate = document.getElementById('btn-date');
      var panelSearch = document.getElementById('panel-search');
      var panelDate = document.getElementById('panel-date');
      var dp = document.getElementById('filter-date');

      function togglePanel(panel) {
        var isOpen = !panel.hidden;
        // close all
        panelSearch.hidden = true;
        panelDate.hidden = true;
        if (!isOpen) {
          panel.hidden = false;
          var input = panel.querySelector('input');
          if (input) input.focus();
        }
      }

      btnSearch.addEventListener('click', function() { togglePanel(panelSearch); });
      btnDate.addEventListener('click', function(e) {
        e.stopPropagation();
        dp.showPicker();
      });

      dp.addEventListener('change', function() {
        if (this.value) {
          window.location.href = '{{ "/search" | relative_url }}?date=' + this.value;
        }
      });

      // Close buttons
      document.querySelectorAll('.panel-close').forEach(function(btn) {
        btn.addEventListener('click', function() {
          document.getElementById(this.dataset.panel).hidden = true;
        });
      });
    })();

    // Infinite scroll — reveal hidden posts in batches
    (function() {
      var BATCH = 20;
      var items = document.querySelectorAll('.post-item[data-idx]');
      if (!items.length) return;

      // Hide all items beyond first BATCH (by NodeList index)
      for (var i = BATCH; i < items.length; i++) {
        items[i].classList.add('hidden-post');
      }

      var shown = Math.min(BATCH, items.length);
      var loader = document.getElementById('scroll-loader');
      if (!loader) return;

      if (shown >= items.length) { loader.style.display = 'none'; return; }

      var observer = new IntersectionObserver(function(entries) {
        if (!entries[0].isIntersecting) return;
        var end = Math.min(shown + BATCH, items.length);
        for (var i = shown; i < end; i++) {
          items[i].classList.remove('hidden-post');
        }
        shown = end;
        if (shown >= items.length) {
          loader.style.display = 'none';
          observer.disconnect();
        } else {
          observer.unobserve(loader);
          observer.observe(loader);
        }
      }, { rootMargin: '400px' });

      observer.observe(loader);
    })();
  </script>
</body>
</html>

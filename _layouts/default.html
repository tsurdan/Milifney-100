<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:type" content="{% if page.title %}article{% else %}website{% endif %}">
  {% if page.image %}<meta property="og:image" content="{{ page.image | relative_url }}">{% endif %}
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📰</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="header-link">
        <h1 class="site-title">{{ site.title }}</h1>
      </a>
      <div class="header-rule"></div>
      <p class="site-tagline">{{ site.tagline }}</p>
      <p class="site-desc">{{ site.description }}</p>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p>
        תוכן מבוסס על חשבון
        <a href="https://x.com/Milifney100" target="_blank" rel="noopener">@Milifney100</a>
      </p>
      <p class="footer-tagline">ההיסטוריה חוזרת ∞</p>
    </div>
  </footer>
</body>
</html>

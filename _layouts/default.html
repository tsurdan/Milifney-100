<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:type" content="{% if page.title %}article{% else %}website{% endif %}">
  {% if page.image %}<meta property="og:image" content="{{ page.image | absolute_url }}">{% endif %}
  <link rel="icon" type="image/png" href="{{ '/assets/images/branding/favicon.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/images/branding/avatar.jpg' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;500;700;900&family=Heebo:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header" style="background-image: url('{{ '/assets/images/branding/banner.jpg' | relative_url }}')">
    <div class="header-overlay"></div>
    <div class="header-inner">
      <a href="{{ '/' | relative_url }}" class="header-link">
        <img src="{{ '/assets/images/branding/avatar.jpg' | relative_url }}" alt="{{ site.title }}" class="site-logo">
        <h1 class="site-title">{{ site.title }}</h1>
      </a>
      <p class="site-tagline">{{ site.tagline }}</p>
      <p class="site-desc">{{ site.description }}</p>
    </div>
  </header>

  <nav class="toolbar">
    <div class="toolbar-inner">
      <form class="search-form" action="{{ '/search' | relative_url }}" method="get">
        <div class="search-field">
          <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <input type="search" name="q" placeholder="חיפוש בידיעות..." class="search-input" autocomplete="off">
        </div>
      </form>
      <div class="date-filter">
        <svg class="date-icon" viewBox="0 0 24 24" width="16" height="16"><rect x="3" y="4" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="2"/><line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="date" id="filter-date" class="filter-date-input" title="בחר תאריך">
      </div>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <p class="footer-credit">
        התוכן באתר מבוסס על חשבון הטוויטר
        <a href="https://x.com/Milifney100" target="_blank" rel="noopener">Milifney100</a>
        ועל
        <a href="https://www.nli.org.il/he/newspapers" target="_blank" rel="noopener">ארכיון העיתונות</a>
      </p>
    </div>
  </footer>
  <script data-goatcounter="https://milifney100.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
  <script>
    // Date picker — initialize to today minus 100 years
    (function() {
      var dp = document.getElementById('filter-date');
      if (!dp) return;
      var now = new Date();
      var defaultDate = new Date(now.getFullYear() - 100, now.getMonth(), now.getDate());
      dp.value = defaultDate.toISOString().split('T')[0];
      // Set range: 1925-01-01 to 1926-12-31 (dynamic based on current year)
      dp.min = (now.getFullYear() - 101) + '-01-01';
      dp.max = (now.getFullYear() - 100) + '-12-31';
      dp.addEventListener('change', function() {
        if (this.value) {
          window.location.href = '{{ "/search" | relative_url }}?date=' + this.value;
        }
      });
    })();

    // Infinite scroll — reveal hidden posts in batches
    (function() {
      var BATCH = 20;
      var items = document.querySelectorAll('.post-item[data-idx]');
      if (!items.length) return;

      // Hide items beyond first batch
      items.forEach(function(el) {
        if (parseInt(el.dataset.idx) >= BATCH) {
          el.classList.add('hidden-post');
        }
      });

      var shown = BATCH;
      var loader = document.getElementById('scroll-loader');
      if (!loader) return;

      var allDone = shown >= items.length;
      if (allDone && loader) loader.style.display = 'none';

      var observer = new IntersectionObserver(function(entries) {
        if (!entries[0].isIntersecting) return;
        // Reveal next batch
        var end = Math.min(shown + BATCH, items.length);
        for (var i = shown; i < end; i++) {
          var el = items[i];
          if (el) el.classList.remove('hidden-post');
        }
        shown = end;
        if (shown >= items.length) {
          loader.style.display = 'none';
          observer.disconnect();
        }
      }, { rootMargin: '400px' });

      observer.observe(loader);
    })();
  </script>
</body>
</html>
